<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>sound board — CSE 125 Group 1</title>
  <meta name="theme-color" content="#08153d">
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="icon" href="../favicon-32.png" type="image/png" sizes="32x32">
  <link rel="preload" href="../fonts/KiwiSoda.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face { font-family: 'KiwiSoda'; src: url('../fonts/KiwiSoda.woff2') format('woff2'); font-display: swap; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: 'KiwiSoda', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .back-link {
      position: fixed; top: 28px; left: 32px; font-size: 18px;
      color: rgba(255,255,255,.55); text-decoration: none;
      letter-spacing: 0.04em; transition: color 200ms ease; z-index: 10;
    }
    .back-link:hover, .back-link:focus-visible { color: #ffd166; outline: none; }

    .layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .layer img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lucky-block-layer {
      animation: block-float 2.6s ease-in-out infinite;
    }

    @keyframes block-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .lucky-block-layer { animation: none; }
    }
  </style>
</head>
<body>

  <div class="layer" style="z-index:0;" aria-hidden="true"><img src="sound_island.png" alt=""></div>
  <div class="layer" style="z-index:1;" aria-hidden="true"><img src="lucky_island.png" alt=""></div>
  <div class="layer lucky-block-layer" style="z-index:2;" aria-hidden="true"><img src="lucky_block.png" alt=""></div>

  <a href="../" class="back-link">← back</a>

</body>
</html>
