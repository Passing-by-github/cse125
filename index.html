<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CSE 125 GROUP 1 — 2026</title>
  <meta name="description" content="Group 1's game site :>">
  <meta name="theme-color" content="#08153d">
  <meta property="og:title" content="CSE 125 GROUP 1 — 2026">
  <meta property="og:description" content="Group 1's game site :>">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preload" href="fonts/KiwiSoda.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/main.png" as="image">
  <style>
    @font-face {
      font-family: 'KiwiSoda';
      src: url('fonts/KiwiSoda.woff2') format('woff2');
      font-display: swap;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'KiwiSoda', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 10%, rgba(255,210,80,.20), transparent 25%),
        radial-gradient(ellipse 70% 55% at 42% 52%, rgba(75,105,255,.45), transparent 65%),
        linear-gradient(180deg, #080026 0%, #12007a 48%, #252cff 100%);
    }

    .stage { position: absolute; inset: 0; display: grid; place-items: center; }
    .scene {
      position: relative;
      width: min(92vw, 150vh);
      aspect-ratio: 2560 / 1351;
    }

    .site-header {
      position: fixed; top: 28px; right: 36px; text-align: right;
      font-family: 'KiwiSoda', system-ui, sans-serif;
      font-size: 22px; color: rgba(255,255,255,.9);
      letter-spacing: 0.04em; z-index: 10;
      text-shadow: 0 2px 14px rgba(0,0,0,.5);
    }
    .site-header .tagline {
      display: block; font-size: 14px;
      color: rgba(255,255,255,.5); margin-top: 3px;
    }

    /* ---- Visual layers (full-canvas images, black = invisible via screen) ---- */
    .layer {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      /*mix-blend-mode: screen;*/
      transition: filter 280ms ease, transform 380ms cubic-bezier(.2,.7,.3,1.2);
      will-change: filter, transform;
    }
    .layer img {
      width: 100%; height: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .clouds-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      left: 0;
      top: 0;
      width: clamp(78px, 8vw, 155px);
      opacity: 0.82;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,.22));
      will-change: transform, opacity;
    }

    .cloud img {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .cloud--small {
      width: clamp(58px, 5.8vw, 112px);
      opacity: 0.72;
    }

    .cloud--large {
      width: clamp(100px, 10vw, 180px);
      opacity: 0.9;
    }

    /* Transform origins at each piece's content center */
    .layer--main     { transform-origin: 30.9% 49.5%; z-index: 3; }
    .layer--repo_sun { transform-origin: 15.6% 16.0%; z-index: 2; }
    .layer--audio    { transform-origin: 51.9% 71.7%; z-index: 2; }
    .layer--reports  { transform-origin: 25.0% 89.4%; z-index: 2; }

    /* Hover glow — triggered via :has() from hotspot hover */
    .scene:has(#hs-main:hover) .layer--main,
    .scene:has(#hs-main:focus-visible) .layer--main {
      
      filter:url(#outline-yellow);
      transform: scale(1.04);
    }
    .scene:has(#hs-sun:hover) .layer--repo_sun,
    .scene:has(#hs-sun:focus-visible) .layer--repo_sun {
      filter: url(#outline-yellow);
      transform: scale(1.06);
    }
    .scene:has(#hs-audio:hover) .layer--audio,
    .scene:has(#hs-audio:focus-visible) .layer--audio {
      filter: url(#outline-yellow);
      transform: scale(1.08);
    }
    .scene:has(#hs-reports:hover) .layer--reports,
    .scene:has(#hs-reports:focus-visible) .layer--reports {
      filter: url(#outline-yellow);
      transform: scale(1.08);
    }

    /* ---- Hotspots (invisible clickable areas over content) ---- */
    .hotspot {
      position: absolute;
      display: block;
      text-decoration: none;
      cursor: pointer;
      z-index: 5;
    }
    .hotspot:focus { outline: none; }

    /* ---- Sun rays ---- */
    .sun-rays {
      position: absolute;
      left: 15.65%; top: 16%;
      width: 160%; aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      background: repeating-conic-gradient(
        from 0deg,
        rgba(255,220,80,.40) 0deg 3deg, transparent 3deg 20deg,
        rgba(255,160,60,.32) 20deg 23deg, transparent 23deg 40deg,
        rgba(255,180,160,.26) 40deg 43deg, transparent 43deg 55deg,
        rgba(255,240,120,.38) 55deg 58deg, transparent 58deg 72deg
      );
      filter: blur(8px);
      mask-image: radial-gradient(circle at center,
        transparent 0%, transparent 3%,
        rgba(0,0,0,.8) 6%, rgba(0,0,0,.7) 25%,
        rgba(0,0,0,.4) 45%, rgba(0,0,0,.15) 65%, transparent 80%
      );
      -webkit-mask-image: radial-gradient(circle at center,
        transparent 0%, transparent 3%,
        rgba(0,0,0,.8) 6%, rgba(0,0,0,.7) 25%,
        rgba(0,0,0,.4) 45%, rgba(0,0,0,.15) 65%, transparent 80%
      );
      animation: sun-rotate 40s linear infinite;
    }
    @keyframes sun-rotate {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Sun pulse */
    .layer--repo_sun {
      animation: sun-pulse 5s ease-in-out infinite;
    }
    @keyframes sun-pulse {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.08); }
    }

    /* ---- Sparkles ---- */
    .sparkle {
  position: fixed;
  left: 0;
  top: 0;
  pointer-events: none;
  z-index: 20;
  opacity: 1;
  will-change: transform, opacity;
}

.sparkle img {
  width: 100%;
  height: 100%;
  display: block;

  filter:
    sepia(.75)
    saturate(3.2)
    hue-rotate(330deg)
    brightness(1.18)
    drop-shadow(0 0 5px rgba(255, 190, 70, .75))
    drop-shadow(0 0 12px rgba(255, 115, 35, .35));
}

    /* ---- Hearts ---- */
    .heart-particle {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 20;
      will-change: transform, opacity;
    }

    .heart-particle img {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ---- Speed lines ---- */
    .speed-particle {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 20;
      will-change: transform, opacity;
    }

    .speed-particle img {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* smoke effect */ 
    .smoke-puff {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 18;
      opacity: 0;
      will-change: transform, opacity;
    }

    .smoke-puff img {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.82;
      filter:
        drop-shadow(0 8px 18px rgba(0,0,0,.10))
        blur(.2px);
    }

    @media (prefers-reduced-motion: reduce) {
      .smoke-puff {
        display: none;
      }
    }


  
    /* ---- Labels ---- */
    .piece__label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) translateY(8px);
      font-family: 'KiwiSoda', system-ui, sans-serif;
      font-size: clamp(1.2rem, 2.5vw, 2.2rem);
      color: #fff; letter-spacing: 0.04em;
      opacity: 0; pointer-events: none;
      transition: opacity 240ms ease, transform 380ms cubic-bezier(.2,.7,.3,1);
      text-shadow: 0 2px 18px rgba(0,0,0,.95), 0 0 30px rgba(0,0,0,.7);
      white-space: nowrap;
    }
    .hotspot:hover .piece__label,
    .hotspot:focus-visible .piece__label {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0);
    }
    #hs-main .piece__label--top    { top: 40%; }
    #hs-main .piece__label--bottom { top: 55%; font-size: clamp(1rem, 2vw, 1.6rem); color: rgba(255,255,255,.75); }

    @media (hover: none) { .piece__label { opacity: .85; } }
    @media (prefers-reduced-motion: reduce) {
      .sun-rays, .layer--repo_sun { animation: none; }
      .sparkle { display: none; }
    }

    .footer-hint {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      font-family: 'KiwiSoda', system-ui, sans-serif;
      font-size: 12px; color: rgba(255,255,255,.4);
      letter-spacing: 0.15em; text-transform: lowercase;
      pointer-events: none;
    }
  </style>

  <script>
    // Position hotspots based on content bounding boxes as % of 2560x1351 canvas
    // Hotspot positions (content bounding boxes as % of 2560x1351 canvas)
    const hotspots = {
      'hs-main':    { left: 10.59, top: 17.76, w: 40.70, h: 63.36 },
      'hs-sun':     { left:  6.84, top:  0.00, w: 17.58, h: 32.05 },
      'hs-audio':   { left: 44.96, top: 49.67, w: 13.83, h: 43.97 },
      'hs-reports': { left: 18.09, top: 79.27, w: 13.83, h: 20.28 },
    };
    for (const [id, p] of Object.entries(hotspots)) {
      const el = document.getElementById(id);
      if (!el) continue;
      el.style.left   = p.left + '%';
      el.style.top    = p.top + '%';
      el.style.width  = p.w + '%';
      el.style.height = p.h + '%';
    }
    
    // Cloud drift along an arc in the sky, behind the islands.
    const cloudsLayer = document.getElementById('cloud-layer');

    if (cloudsLayer) {
      const firstRowImages = Array.from({ length: 8 }, (_, i) => `assets/cloud_${i + 1}.png`);
      const secondRowImages = [...firstRowImages].sort(() => Math.random() - 0.5);
      const cloudImages = [...firstRowImages, ...secondRowImages];
      const clouds = [];

      const path = {
        start: { x: 10, y: 100 },
        c1: { x: 16, y: 38 },
        c2: { x: 82, y: 20 },
        end: { x: 100, y: 34 }
      };

      const cubicBezier = (p0, p1, p2, p3, t) => {
        const u = 1 - t;
        return {
          x: u * u * u * p0.x + 3 * u * u * t * p1.x + 3 * u * t * t * p2.x + t * t * t * p3.x,
          y: u * u * u * p0.y + 3 * u * u * t * p1.y + 3 * u * t * t * p2.y + t * t * t * p3.y
        };
      };

      function createCloud(src, index) {
        const el = document.createElement('div');
        const row = index < 8 ? 0 : 1;
        const positionInRow = index % 8;
        el.className = `cloud ${index % 3 === 0 ? 'cloud--large' : index % 2 === 0 ? 'cloud--small' : ''}`;

        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.draggable = false;

        el.appendChild(img);
        cloudsLayer.appendChild(el);

        return {
          el,
          row,
          speed: 0.03 + Math.random() * 0.009 + (row === 1 ? 0.01 : 0),
          offset: positionInRow / 16,
          scale: 0.8 + Math.random() * 0.25,
          drift: row === 0 ? -0.02 + Math.random() * 0.04 : 0.01 + Math.random() * 0.03
        };
      }

      cloudImages.forEach((src, index) => clouds.push(createCloud(src, index)));

      let cloudAnimationFrame = null;
      let lastCloudTime = performance.now();

      function updateClouds(now) {
        const width = cloudsLayer.clientWidth || 1;
        const height = cloudsLayer.clientHeight || 1;

        clouds.forEach((cloud) => {
          const phase = (now / 1000) * cloud.speed + cloud.offset + cloud.drift;
          const looped = phase % 1;
          const p = cubicBezier(path.start, path.c1, path.c2, path.end, looped);

          const x = (p.x / 100) * width - cloud.el.offsetWidth / 2;
          const rowGap = 14;
          const yPercent = p.y + cloud.row * rowGap;
          const y = (yPercent / 100) * height - cloud.el.offsetHeight / 2;

          cloud.el.style.transform = `translate(${x}px, ${y}px) scale(${cloud.scale})`;
        });

        cloudAnimationFrame = requestAnimationFrame(updateClouds);
      }

      const resizeClouds = () => {
        if (!cloudAnimationFrame) {
          lastCloudTime = performance.now();
          cloudAnimationFrame = requestAnimationFrame(updateClouds);
        }
      };

      window.addEventListener('resize', resizeClouds);
      resizeClouds();
    }

    // ---- Starfield ----
  (function () {
    const container = document.getElementById('starfield');
    const STAR_COUNT = 80;

    for (let i = 0; i < STAR_COUNT; i++) {
      const el = document.createElement('img');
      el.src = 'assets/spark.png';
      el.alt = '';
      el.draggable = false;

      const size = 4 + Math.random() * 10;
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const opacity = 0.25 + Math.random() * 0.65;

      el.style.cssText = `
        position: absolute;
        left: ${x}%;
        top: ${y}%;
        width: ${size}px;
        height: ${size}px;
        opacity: ${opacity.toFixed(2)};
        pointer-events: none;
        user-select: none;
      `;

      container.appendChild(el);
    }
  })();

  // Sparkles on sun hover — lingering + full-screen bouncing
const sunHotspot = document.getElementById('hs-sun');

let sparkleTimer = null;
let sparkleRAF = null;
let lastSparkleTime = performance.now();

const sparkleImages = ['assets/spark.png', 'assets/Star.png'];
const sparkles = [];

const MAX_SPARKLES = 45;

function spawnSparkle() {
  if (sparkles.length >= MAX_SPARKLES) {
    const old = sparkles.shift();
    old.el.remove();
  }

  const sunRect = sunHotspot.getBoundingClientRect();

  const cx = sunRect.left + sunRect.width * 0.5;
  const cy = sunRect.top + sunRect.height * 0.45;

  const r = (Math.random() * 0.38 + 0.05) * sunRect.width;
  const a0 = Math.random() * Math.PI * 2;

  const x = cx + Math.cos(a0) * r;
  const y = cy + Math.sin(a0) * r;

  const size = 12 + Math.random() * 22;
  const angle = Math.random() * Math.PI * 2;
  const speed = 55 + Math.random() * 80;

  const el = document.createElement('div');
  el.className = 'sparkle';

  const img = document.createElement('img');
  img.src = sparkleImages[Math.floor(Math.random() * sparkleImages.length)];
  img.alt = '';
  img.draggable = false;

  el.appendChild(img);
  document.body.appendChild(el);

  const life = 3.5 + Math.random() * 2.2;

  const sparkle = {
    el,
    x,
    y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - 25,
    size,
    life,
    maxLife: life,
    rotation: Math.random() * 360,
    rotationSpeed: -90 + Math.random() * 180
  };

  el.style.width = size + 'px';
  el.style.height = size + 'px';

  sparkles.push(sparkle);

  if (!sparkleRAF) {
    lastSparkleTime = performance.now();
    sparkleRAF = requestAnimationFrame(updateSparkles);
  }
}

function updateSparkles(now) {
  const dt = Math.min((now - lastSparkleTime) / 1000, 0.033);
  lastSparkleTime = now;

  const boundsW = window.innerWidth;
  const boundsH = window.innerHeight;

  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];

    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.rotation += s.rotationSpeed * dt;
    s.life -= dt;

    // Bounce from full screen edges
    if (s.x <= 0) {
      s.x = 0;
      s.vx *= -0.86;
    }

    if (s.x + s.size >= boundsW) {
      s.x = boundsW - s.size;
      s.vx *= -0.86;
    }

    if (s.y <= 0) {
      s.y = 0;
      s.vy *= -0.86;
    }

    if (s.y + s.size >= boundsH) {
      s.y = boundsH - s.size;
      s.vy *= -0.86;
    }

    // soft floaty slowing
    s.vx *= 0.996;
    s.vy *= 0.996;

    const opacity = Math.max(s.life / s.maxLife, 0);
    const scale = 0.65 + opacity * 0.45;

    s.el.style.opacity = opacity;
    s.el.style.transform =
      `translate(${s.x}px, ${s.y}px) scale(${scale}) rotate(${s.rotation}deg)`;

    if (s.life <= 0) {
      s.el.remove();
      sparkles.splice(i, 1);
    }
  }

  if (sparkles.length > 0) {
    sparkleRAF = requestAnimationFrame(updateSparkles);
  } else {
    sparkleRAF = null;
  }
}

sunHotspot.addEventListener('mouseenter', () => {
  spawnSparkle();
  sparkleTimer = setInterval(spawnSparkle, 95);
});

sunHotspot.addEventListener('mouseleave', () => {
  clearInterval(sparkleTimer);
  sparkleTimer = null;

  for (let i = 0; i < 6; i++) {
    setTimeout(spawnSparkle, i * 55);
  }
});


// ---- Smoke on sound-board hover ----
const audioHotspot = document.getElementById('hs-audio');

let smokeTimer = null;
let smokeRAF = null;
let lastSmokeTime = performance.now();

const smokes = [];
const MAX_SMOKES = 10;

function spawnSmoke() {
  if (!audioHotspot) return;

  if (smokes.length >= MAX_SMOKES) {
    const old = smokes.shift();
    old.el.remove();
  }

  const rect = audioHotspot.getBoundingClientRect();

  // spawn from upper-middle area of the sound board island
  const x = rect.left + rect.width * (0.42 + Math.random() * 0.16);
  const y = rect.top + rect.height * (0.18 + Math.random() * 0.12);

  const size = 60 + Math.random() * 40;
  const drift = -18 + Math.random() * 36;
  const rise = 26 + Math.random() * 55;
  const life = 1.8 + Math.random() * 2.4;

  const el = document.createElement('div');
  el.className = 'smoke-puff';

  const img = document.createElement('img');
  img.src = 'assets/smoke.png';
  img.alt = '';
  img.draggable = false;

  el.appendChild(img);
  document.body.appendChild(el);

  el.style.width = size + 'px';
  el.style.height = size + 'px';

  const smoke = {
    el,
    x,
    y,
    vx: drift,
    vy: -rise,
    size,
    life,
    maxLife: life,
    scale: 0.72 + Math.random() * 0.18,
    scaleGrow: 0.18 + Math.random() * 0.22,
    rot: -10 + Math.random() * 20,
    rotSpeed: -8 + Math.random() * 16
  };

  smokes.push(smoke);

  if (!smokeRAF) {
    lastSmokeTime = performance.now();
    smokeRAF = requestAnimationFrame(updateSmoke);
  }
}

function updateSmoke(now) {
  const dt = Math.min((now - lastSmokeTime) / 1000, 0.033);
  lastSmokeTime = now;

  for (let i = smokes.length - 1; i >= 0; i--) {
    const s = smokes[i];

    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.rot += s.rotSpeed * dt;
    s.life -= dt;

    // soften movement over time
    s.vx *= 0.994;
    s.vy *= 0.997;

    const t = 1 - (s.life / s.maxLife); // 0 -> 1
    let opacity;

    if (t < 0.15) {
      opacity = (t / 0.15) * 0.72;
    } else if (t < 0.65) {
      opacity = 0.72;
    } else {
      opacity = ((1 - t) / 0.35) * 0.72;
    }

    const scale = s.scale + t * s.scaleGrow;

    s.el.style.opacity = Math.max(opacity, 0);
    s.el.style.transform =
      `translate(${s.x}px, ${s.y}px) scale(${scale}) rotate(${s.rot}deg)`;

    if (s.life <= 0) {
      s.el.remove();
      smokes.splice(i, 1);
    }
  }

  if (smokes.length > 0) {
    smokeRAF = requestAnimationFrame(updateSmoke);
  } else {
    smokeRAF = null;
  }
}

audioHotspot?.addEventListener('mouseenter', () => {
  spawnSmoke();
  smokeTimer = setInterval(spawnSmoke, 270);
});

audioHotspot?.addEventListener('mouseleave', () => {
  clearInterval(smokeTimer);
  smokeTimer = null;

  // slight lingering burst, like the sparkles
  for (let i = 0; i < 4; i++) {
    setTimeout(spawnSmoke, i * 90);
  }
});

  // ---- Hearts on main island hover ----
  const mainHotspot = document.getElementById('hs-main');

  let heartTimer = null;
  let heartRAF = null;
  let lastHeartTime = performance.now();

  const hearts = [];
  const MAX_HEARTS = 30;

  function spawnHeart() {
    if (hearts.length >= MAX_HEARTS) {
      const old = hearts.shift();
      old.el.remove();
    }

    const rect = mainHotspot.getBoundingClientRect();

    const x = rect.left + rect.width * (0.2 + Math.random() * 0.6);
    const y = rect.top + rect.height * (0.3 + Math.random() * 0.5);

    const size = 18 + Math.random() * 22;
    const angle = -Math.PI / 2 + (-0.6 + Math.random() * 1.2);
    const speed = 60 + Math.random() * 80;

    const el = document.createElement('div');
    el.className = 'heart-particle';

    const img = document.createElement('img');
    img.src = 'assets/heart.png';
    img.alt = '';
    img.draggable = false;

    el.appendChild(img);
    document.body.appendChild(el);

    el.style.width = size + 'px';
    el.style.height = size + 'px';

    // pop-out: start small, overshoot big, then shrink to nothing
    const life = 0.55 + Math.random() * 0.3;

    hearts.push({
      el,
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size,
      life,
      maxLife: life,
      rotation: Math.random() * 360,
      rotationSpeed: -60 + Math.random() * 120
    });

    if (!heartRAF) {
      lastHeartTime = performance.now();
      heartRAF = requestAnimationFrame(updateHearts);
    }
  }

  function updateHearts(now) {
    const dt = Math.min((now - lastHeartTime) / 1000, 0.033);
    lastHeartTime = now;

    for (let i = hearts.length - 1; i >= 0; i--) {
      const h = hearts[i];

      h.x += h.vx * dt;
      h.y += h.vy * dt;
      h.rotation += h.rotationSpeed * dt;
      h.life -= dt;

      h.vx *= 0.97;
      h.vy *= 0.97;

      // t goes 0 -> 1 over lifetime
      const t = 1 - (h.life / h.maxLife);

      // pop curve: scale up fast then shrink — peaks around t=0.35
      const scale = t < 0.35
        ? t / 0.35 * 1.4          // 0 -> 1.4 (overshoot)
        : 1.4 * (1 - (t - 0.35) / 0.65); // 1.4 -> 0

      // opacity: full until 60% through, then snap-fade
      const opacity = t < 0.6 ? 1 : 1 - (t - 0.6) / 0.4;

      h.el.style.opacity = Math.max(opacity, 0);
      h.el.style.transform =
        `translate(${h.x}px, ${h.y}px) scale(${Math.max(scale, 0)}) rotate(${h.rotation}deg)`;

      if (h.life <= 0) {
        h.el.remove();
        hearts.splice(i, 1);
      }
    }

    if (hearts.length > 0) {
      heartRAF = requestAnimationFrame(updateHearts);
    } else {
      heartRAF = null;
    }
  }

  // ---- Speed particles on reports island hover ----
  const reportsHotspot = document.getElementById('hs-reports');

  let speedTimer = null;
  let speedRAF = null;
  let lastSpeedTime = performance.now();

  const speeds = [];
  const MAX_SPEEDS = 25;

  function spawnSpeed() {
    if (speeds.length >= MAX_SPEEDS) {
      const old = speeds.shift();
      old.el.remove();
    }

    const rect = reportsHotspot.getBoundingClientRect();

    const x = rect.left + rect.width * (0.2 + Math.random() * 0.6);
    const y = rect.top + rect.height * (0.2 + Math.random() * 0.6);

    const size = 20 + Math.random() * 20;
    const life = 0.7 + Math.random() * 0.4;

    // shoot mostly outward/upward
    const baseAngle = -Math.PI / 2 + (-0.9 + Math.random() * 1.8);
    const speed = 90 + Math.random() * 100;

    const el = document.createElement('div');
    el.className = 'speed-particle';

    const img = document.createElement('img');
    img.src = 'assets/speed.png';
    img.alt = '';
    img.draggable = false;

    el.appendChild(img);
    document.body.appendChild(el);

    el.style.width = size + 'px';
    el.style.height = size + 'px';

    speeds.push({
      el,
      x,
      y,
      vx: Math.cos(baseAngle) * speed,
      vy: Math.sin(baseAngle) * speed,
      size,
      life,
      maxLife: life,
      // zig-zag: perpendicular oscillation
      zigFreq: 6 + Math.random() * 6,       // oscillations per second
      zigAmp: 55 + Math.random() * 70,       // px/s lateral amplitude
      zigPhase: Math.random() * Math.PI * 2,
      // perpendicular axis (rotate base direction 90°)
      perpX: -Math.sin(baseAngle),
      perpY:  Math.cos(baseAngle),
      rotation: Math.random() * 360,
      rotSpeed: -80 + Math.random() * 160
    });

    if (!speedRAF) {
      lastSpeedTime = performance.now();
      speedRAF = requestAnimationFrame(updateSpeeds);
    }
  }

  function updateSpeeds(now) {
    const dt = Math.min((now - lastSpeedTime) / 1000, 0.033);
    lastSpeedTime = now;

    for (let i = speeds.length - 1; i >= 0; i--) {
      const s = speeds[i];

      // zig-zag via sinusoidal perpendicular velocity
      const elapsed = s.maxLife - s.life;
      const zigV = Math.sin(elapsed * s.zigFreq * Math.PI * 2 + s.zigPhase) * s.zigAmp;

      s.x += (s.vx + s.perpX * zigV) * dt;
      s.y += (s.vy + s.perpY * zigV) * dt;
      s.rotation += s.rotSpeed * dt;
      s.life -= dt;

      s.vx *= 0.97;
      s.vy *= 0.97;

      const t = 1 - (s.life / s.maxLife);
      // quick scale-in, hold, then shrink out
      const scale = t < 0.2
        ? t / 0.2
        : t < 0.7
          ? 1
          : 1 - (t - 0.7) / 0.3;

      const opacity = t < 0.15 ? t / 0.15 : t < 0.75 ? 1 : 1 - (t - 0.75) / 0.25;

      s.el.style.opacity = Math.max(opacity, 0);
      s.el.style.transform =
        `translate(${s.x}px, ${s.y}px) scale(${Math.max(scale, 0)}) rotate(${s.rotation}deg)`;

      if (s.life <= 0) {
        s.el.remove();
        speeds.splice(i, 1);
      }
    }

    if (speeds.length > 0) {
      speedRAF = requestAnimationFrame(updateSpeeds);
    } else {
      speedRAF = null;
    }
  }

  reportsHotspot.addEventListener('mouseenter', () => {
    spawnSpeed();
    speedTimer = setInterval(spawnSpeed, 110);
  });

  reportsHotspot.addEventListener('mouseleave', () => {
    clearInterval(speedTimer);
    speedTimer = null;

    for (let i = 0; i < 5; i++) {
      setTimeout(spawnSpeed, i * 60);
    }
  });

  mainHotspot.addEventListener('mouseenter', () => {
    spawnHeart();
    heartTimer = setInterval(spawnHeart, 120);
  });

  mainHotspot.addEventListener('mouseleave', () => {
    clearInterval(heartTimer);
    heartTimer = null;

    for (let i = 0; i < 5; i++) {
      setTimeout(spawnHeart, i * 60);
    }
  });

  </script>
</body>
