<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CSE 125 GROUP 1 — 2026</title>
  <meta name="description" content="Group 1's game site :>">
  <meta name="theme-color" content="#08153d">
  <meta property="og:title" content="CSE 125 GROUP 1 — 2026">
  <meta property="og:description" content="Group 1's game site :>">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preload" href="fonts/KiwiSoda.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/main.png" as="image">
  <style>
    @font-face {
      font-family: 'KiwiSoda';
      src: url('fonts/KiwiSoda.woff2') format('woff2');
      font-display: swap;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'KiwiSoda', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 10%, rgba(255,210,80,.20), transparent 25%),
        radial-gradient(ellipse 70% 55% at 42% 52%, rgba(75,105,255,.45), transparent 65%),
        linear-gradient(180deg, #080026 0%, #12007a 48%, #252cff 100%);
    }

    .stage { position: absolute; inset: 0; display: grid; place-items: center; }
    .scene {
      position: relative;
      width: min(92vw, 150vh);
      aspect-ratio: 2560 / 1351;
    }

    .site-header {
      position: fixed; top: 28px; right: 36px; text-align: right;
      font-family: 'KiwiSoda', system-ui, sans-serif;
      font-size: 22px; color: rgba(255,255,255,.9);
      letter-spacing: 0.04em; z-index: 10;
      text-shadow: 0 2px 14px rgba(0,0,0,.5);
    }
    .site-header .tagline {
      display: block; font-size: 14px;
      color: rgba(255,255,255,.5); margin-top: 3px;
    }

    /* ---- Visual layers (full-canvas images, black = invisible via screen) ---- */
    .layer {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      /*mix-blend-mode: screen;*/
      transition: filter 280ms ease, transform 380ms cubic-bezier(.2,.7,.3,1.2);
      will-change: filter, transform;
    }
    .layer img {
      width: 100%; height: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .clouds-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      left: 0;
      top: 0;
      width: clamp(78px, 8vw, 155px);
      opacity: 0.82;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,.22));
      will-change: transform, opacity;
    }

    .cloud img {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .cloud--small {
      width: clamp(58px, 5.8vw, 112px);
      opacity: 0.72;
    }

    .cloud--large {
      width: clamp(100px, 10vw, 180px);
      opacity: 0.9;
    }

    /* Transform origins at each piece's content center */
    .layer--main     { transform-origin: 30.9% 49.5%; z-index: 3; }
    .layer--repo_sun { transform-origin: 15.6% 16.0%; z-index: 2; }
    .layer--audio    { transform-origin: 51.9% 71.7%; z-index: 2; }
    .layer--reports  { transform-origin: 25.0% 89.4%; z-index: 2; }

    /* Hover glow — triggered via :has() from hotspot hover */
    .scene:has(#hs-main:hover) .layer--main,
    .scene:has(#hs-main:focus-visible) .layer--main {
      
      filter:url(#outline-yellow);
      transform: scale(1.04);
    }
    .scene:has(#hs-sun:hover) .layer--repo_sun,
    .scene:has(#hs-sun:focus-visible) .layer--repo_sun {
      filter: url(#outline-yellow);
      transform: scale(1.06);
    }
    .scene:has(#hs-audio:hover) .layer--audio,
    .scene:has(#hs-audio:focus-visible) .layer--audio {
      filter: url(#outline-yellow);
      transform: scale(1.08);
    }
    .scene:has(#hs-reports:hover) .layer--reports,
    .scene:has(#hs-reports:focus-visible) .layer--reports {
      filter: url(#outline-yellow);
      transform: scale(1.08);
    }

    /* ---- Hotspots (invisible clickable areas over content) ---- */
    .hotspot {
      position: absolute;
      display: block;
      text-decoration: none;
      cursor: pointer;
      z-index: 5;
    }
    .hotspot:focus { outline: none; }

    /* ---- Sun rays ---- */
    .sun-rays {
      position: absolute;
      left: 15.65%; top: 16%;
      width: 160%; aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      background: repeating-conic-gradient(
        from 0deg,
        rgba(255,220,80,.40) 0deg 3deg, transparent 3deg 20deg,
        rgba(255,160,60,.32) 20deg 23deg, transparent 23deg 40deg,
        rgba(255,180,160,.26) 40deg 43deg, transparent 43deg 55deg,
        rgba(255,240,120,.38) 55deg 58deg, transparent 58deg 72deg
      );
      filter: blur(8px);
      mask-image: radial-gradient(circle at center,
        transparent 0%, transparent 3%,
        rgba(0,0,0,.8) 6%, rgba(0,0,0,.7) 25%,
        rgba(0,0,0,.4) 45%, rgba(0,0,0,.15) 65%, transparent 80%
      );
      -webkit-mask-image: radial-gradient(circle at center,
        transparent 0%, transparent 3%,
        rgba(0,0,0,.8) 6%, rgba(0,0,0,.7) 25%,
        rgba(0,0,0,.4) 45%, rgba(0,0,0,.15) 65%, transparent 80%
      );
      animation: sun-rotate 40s linear infinite;
    }
    @keyframes sun-rotate {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Sun pulse */
    .layer--repo_sun {
      animation: sun-pulse 5s ease-in-out infinite;
    }
    @keyframes sun-pulse {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.08); }
    }

    /* ---- Ship ---- */
    .ship-link {
      position: fixed;
      right: 7vw;
      top: 14vh;
      z-index: 5;
      display: block;
      width: clamp(90px, 10vw, 160px);
      animation: ship-float 3.8s ease-in-out infinite;
      transition: filter 220ms ease, transform 220ms ease;
      cursor: pointer;
    }
    .ship-link img {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .ship-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translateX(-50%) translateY(8px);
      font-family: 'KiwiSoda', system-ui, sans-serif;
      font-size: clamp(2.1rem, 3vw, 2.5rem);
      color: #fff;
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease, transform 380ms cubic-bezier(.2,.7,.3,1);
      white-space: nowrap;
    }
    .ship-link:hover { filter: drop-shadow(0 0 12px rgba(180,220,255,.8)); }
    .ship-link:hover .ship-label,
    .ship-link:focus-visible .ship-label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @keyframes ship-float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-12px) rotate(2deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ship-link { animation: none; }
      .player_heads img { display: none;}
    }

    /* ---- Particles (shared base) ---- */
    .particle {
      position: fixed; left: 0; top: 0;
      pointer-events: none; z-index: 20;
      will-change: transform, opacity;
    }
    .particle img { width: 100%; height: 100%; display: block; }

    .sparkle img {
      filter: sepia(.75) saturate(3.2) hue-rotate(330deg) brightness(1.18)
              drop-shadow(0 0 5px rgba(255,190,70,.75))
              drop-shadow(0 0 12px rgba(255,115,35,.35));
    }
    .heart-particle img {
      filter: drop-shadow(0 0 5px rgba(255,80,120,.85))
              drop-shadow(0 0 14px rgba(255,30,80,.45));
    }
    .speed-particle img {
      filter: drop-shadow(0 0 5px rgba(80,220,255,.85))
              drop-shadow(0 0 14px rgba(30,160,255,.45));
    }
    .player_heads img {
      filter: drop-shadow(0 0 4px rgba(255,255,255,.85));
    }
    .smoke-puff { z-index: 18; }
    .smoke-puff img {
      opacity: 0.82;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.10)) blur(.2px);
    }
    @media (prefers-reduced-motion: reduce) { .smoke-puff, .particle { display: none; } }


  
    /* ---- Labels ---- */
    .piece__label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) translateY(8px);
      font-family: 'KiwiSoda', system-ui, sans-serif;
      font-size: clamp(1.2rem, 2.5vw, 2.2rem);
      color: #fff; letter-spacing: 0.04em;
      opacity: 0; pointer-events: none;
      transition: opacity 240ms ease, transform 380ms cubic-bezier(.2,.7,.3,1);
      text-shadow: 0 2px 18px rgba(0,0,0,.95), 0 0 30px rgba(0,0,0,.7);
      white-space: nowrap;
    }
    .hotspot:hover .piece__label,
    .hotspot:focus-visible .piece__label {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0);
    }
    #hs-main .piece__label--top    { top: 40%; }
    #hs-main .piece__label--bottom { top: 55%; font-size: clamp(1rem, 2vw, 1.6rem); color: rgba(255,255,255,.75); }

    @media (hover: none) { .piece__label { opacity: .85; } }
    @media (prefers-reduced-motion: reduce) {
      .sun-rays, .layer--repo_sun { animation: none; }
      .sparkle { display: none; }
    }

    .footer-hint {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      font-family: 'KiwiSoda', system-ui, sans-serif;
      font-size: 12px; color: rgba(255,255,255,.4);
      letter-spacing: 0.15em; text-transform: lowercase;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header class="site-header">
    cse 125 · group 1 · 2026
    <span class="tagline">join us in our journey</span>
  </header>

  <div id="starfield" style="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;" aria-hidden="true"></div>

  <script>
    // Position hotspots based on content bounding boxes as % of 2560x1351 canvas
    // Hotspot positions (content bounding boxes as % of 2560x1351 canvas)
    const hotspots = {
      'hs-main':    { left: 10.59, top: 17.76, w: 40.70, h: 63.36 },
      'hs-sun':     { left:  6.84, top:  0.00, w: 17.58, h: 32.05 },
      'hs-audio':   { left: 44.96, top: 49.67, w: 13.83, h: 43.97 },
      'hs-reports': { left: 18.09, top: 79.27, w: 13.83, h: 20.28 },
    };
    for (const [id, p] of Object.entries(hotspots)) {
      const el = document.getElementById(id);
      if (!el) continue;
      el.style.left   = p.left + '%';
      el.style.top    = p.top + '%';
      el.style.width  = p.w + '%';
      el.style.height = p.h + '%';
    }
    
    // Cloud drift along an arc in the sky, behind the islands.
    const cloudsLayer = document.getElementById('cloud-layer');

    if (cloudsLayer) {
      const firstRowImages = Array.from({ length: 8 }, (_, i) => `assets/cloud_${i + 1}.png`);
      const secondRowImages = [...firstRowImages].sort(() => Math.random() - 0.5);
      const cloudImages = [...firstRowImages, ...secondRowImages];
      const clouds = [];

      const path = {
        start: { x: 10, y: 100 },
        c1: { x: 16, y: 38 },
        c2: { x: 82, y: 20 },
        end: { x: 100, y: 34 }
      };

      const cubicBezier = (p0, p1, p2, p3, t) => {
        const u = 1 - t;
        return {
          x: u * u * u * p0.x + 3 * u * u * t * p1.x + 3 * u * t * t * p2.x + t * t * t * p3.x,
          y: u * u * u * p0.y + 3 * u * u * t * p1.y + 3 * u * t * t * p2.y + t * t * t * p3.y
        };
      };

      function createCloud(src, index) {
        const el = document.createElement('div');
        const row = index < 8 ? 0 : 1;
        const positionInRow = index % 8;
        el.className = `cloud ${index % 3 === 0 ? 'cloud--large' : index % 2 === 0 ? 'cloud--small' : ''}`;

        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.draggable = false;

        el.appendChild(img);
        cloudsLayer.appendChild(el);

        return {
          el,
          row,
          speed: 0.03 + Math.random() * 0.009 + (row === 1 ? 0.01 : 0),
          offset: positionInRow / 16,
          scale: 0.8 + Math.random() * 0.25,
          drift: row === 0 ? -0.02 + Math.random() * 0.04 : 0.01 + Math.random() * 0.03
        };
      }

      cloudImages.forEach((src, index) => clouds.push(createCloud(src, index)));

      let cloudAnimationFrame = null;
      let lastCloudTime = performance.now();

      function updateClouds(now) {
        const width = cloudsLayer.clientWidth || 1;
        const height = cloudsLayer.clientHeight || 1;

        clouds.forEach((cloud) => {
          const phase = (now / 1000) * cloud.speed + cloud.offset + cloud.drift;
          const looped = phase % 1;
          const p = cubicBezier(path.start, path.c1, path.c2, path.end, looped);

          const x = (p.x / 100) * width - cloud.el.offsetWidth / 2;
          const rowGap = 14;
          const yPercent = p.y + cloud.row * rowGap;
          const y = (yPercent / 100) * height - cloud.el.offsetHeight / 2;

          cloud.el.style.transform = `translate(${x}px, ${y}px) scale(${cloud.scale})`;
        });

        cloudAnimationFrame = requestAnimationFrame(updateClouds);
      }

      const resizeClouds = () => {
        if (!cloudAnimationFrame) {
          lastCloudTime = performance.now();
          cloudAnimationFrame = requestAnimationFrame(updateClouds);
        }
      };

      window.addEventListener('resize', resizeClouds);
      resizeClouds();
    }

    // ---- Starfield ----
  (function () {
    const container = document.getElementById('starfield');
    const STAR_COUNT = 80;

    for (let i = 0; i < STAR_COUNT; i++) {
      const el = document.createElement('img');
      el.src = 'assets/spark.png';
      el.alt = '';
      el.draggable = false;

      const size = 4 + Math.random() * 10;
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const opacity = 0.25 + Math.random() * 0.65;

      el.style.cssText = `
        position: absolute;
        left: ${x}%;
        top: ${y}%;
        width: ${size}px;
        height: ${size}px;
        opacity: ${opacity.toFixed(2)};
        pointer-events: none;
        user-select: none;
      `;

      container.appendChild(el);
    }
  })();

  // ---- Particle system factory ----
  function makeParticleSystem({ hotspot, cssClass, max, interval, burstCount, burstDelay, spawn, update }) {
    if (!hotspot) return;
    const pool = [];
    let timer = null, raf = null, last = performance.now();

    function spawnOne() {
      if (pool.length >= max) pool.shift().el.remove();
      const p = spawn(hotspot.getBoundingClientRect());
      const el = document.createElement('div');
      el.className = 'particle ' + cssClass;
      const img = document.createElement('img');
      img.alt = ''; img.draggable = false; img.src = p.src;
      el.style.cssText = `width:${p.size}px;height:${p.size}px`;
      el.appendChild(img);
      document.body.appendChild(el);
      p.el = el;
      pool.push(p);
      if (!raf) { last = performance.now(); raf = requestAnimationFrame(tick); }
    }

    function tick(now) {
      const dt = Math.min((now - last) / 1000, 0.033);
      last = now;
      for (let i = pool.length - 1; i >= 0; i--) {
        const p = pool[i];
        p.life -= dt;
        if (p.life <= 0) { p.el.remove(); pool.splice(i, 1); continue; }
        update(p, dt);
      }
      raf = pool.length > 0 ? requestAnimationFrame(tick) : null;
    }

    hotspot.addEventListener('mouseenter', () => { spawnOne(); timer = setInterval(spawnOne, interval); });
    hotspot.addEventListener('mouseleave', () => {
      clearInterval(timer); timer = null;
      for (let i = 0; i < burstCount; i++) setTimeout(spawnOne, i * burstDelay);
    });
  }

  // ---- Sparkles (sun) ----
  makeParticleSystem({
    hotspot: document.getElementById('hs-sun'),
    cssClass: 'sparkle', max: 45, interval: 95, burstCount: 6, burstDelay: 55,
    spawn(rect) {
      const cx = rect.left + rect.width * 0.5, cy = rect.top + rect.height * 0.45;
      const r = (Math.random() * 0.38 + 0.05) * rect.width, a = Math.random() * Math.PI * 2;
      const angle = Math.random() * Math.PI * 2, speed = 55 + Math.random() * 80;
      const life = 3.5 + Math.random() * 2.2, size = 12 + Math.random() * 22;
      return {
        src: Math.random() < 0.5 ? 'assets/spark.png' : 'assets/Star.png',
        x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r, size,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 25,
        life, maxLife: life, rot: Math.random() * 360, rotV: -90 + Math.random() * 180
      };
    },
    update(p, dt) {
      const W = window.innerWidth, H = window.innerHeight;
      p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.rotV * dt;
      if (p.x <= 0)          { p.x = 0;          p.vx *= -0.86; }
      if (p.x + p.size >= W) { p.x = W - p.size; p.vx *= -0.86; }
      if (p.y <= 0)          { p.y = 0;          p.vy *= -0.86; }
      if (p.y + p.size >= H) { p.y = H - p.size; p.vy *= -0.86; }
      p.vx *= 0.996; p.vy *= 0.996;
      const op = Math.max(p.life / p.maxLife, 0);
      p.el.style.opacity = op;
      p.el.style.transform = `translate(${p.x}px,${p.y}px) scale(${0.65 + op * 0.45}) rotate(${p.rot}deg)`;
    }
  });

  // ---- Smoke (audio island) ----
  makeParticleSystem({
    hotspot: document.getElementById('hs-audio'),
    cssClass: 'smoke-puff', max: 10, interval: 270, burstCount: 4, burstDelay: 90,
    spawn(rect) {
      const life = 1.8 + Math.random() * 2.4, size = 60 + Math.random() * 40;
      return {
        src: 'assets/Smoke.png', size,
        x: rect.left + rect.width  * (0.42 + Math.random() * 0.16),
        y: rect.top  + rect.height * (0.18 + Math.random() * 0.12),
        vx: -18 + Math.random() * 36, vy: -(26 + Math.random() * 55),
        life, maxLife: life,
        scale: 0.72 + Math.random() * 0.18, scaleGrow: 0.18 + Math.random() * 0.22,
        rot: -10 + Math.random() * 20, rotV: -8 + Math.random() * 16
      };
    },
    update(p, dt) {
      p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.rotV * dt;
      p.vx *= 0.994; p.vy *= 0.997;
      const t = 1 - p.life / p.maxLife;
      const op = t < 0.15 ? (t / 0.15) * 0.72 : t < 0.65 ? 0.72 : ((1 - t) / 0.35) * 0.72;
      p.el.style.opacity = Math.max(op, 0);
      p.el.style.transform = `translate(${p.x}px,${p.y}px) scale(${p.scale + t * p.scaleGrow}) rotate(${p.rot}deg)`;
    }
  });

  // ---- Hearts (main island) ----
  makeParticleSystem({
    hotspot: document.getElementById('hs-main'),
    cssClass: 'heart-particle', max: 30, interval: 120, burstCount: 5, burstDelay: 60,
    spawn(rect) {
      const angle = -Math.PI / 2 + (-0.6 + Math.random() * 1.2), speed = 60 + Math.random() * 80;
      const life = 0.55 + Math.random() * 0.3, size = 18 + Math.random() * 22;
      return {
        src: 'assets/heart.png', size,
        x: rect.left + rect.width  * (0.2 + Math.random() * 0.6),
        y: rect.top  + rect.height * (0.3 + Math.random() * 0.5),
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life, maxLife: life, rot: Math.random() * 360, rotV: -60 + Math.random() * 120
      };
    },
    update(p, dt) {
      p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.rotV * dt;
      p.vx *= 0.97; p.vy *= 0.97;
      const t = 1 - p.life / p.maxLife;
      const scale = t < 0.35 ? t / 0.35 * 1.4 : 1.4 * (1 - (t - 0.35) / 0.65);
      const op = t < 0.6 ? 1 : 1 - (t - 0.6) / 0.4;
      p.el.style.opacity = Math.max(op, 0);
      p.el.style.transform = `translate(${p.x}px,${p.y}px) scale(${Math.max(scale, 0)}) rotate(${p.rot}deg)`;
    }
  });

  // ---- Speed lines (reports island) ----
  makeParticleSystem({
    hotspot: document.getElementById('hs-reports'),
    cssClass: 'speed-particle', max: 25, interval: 110, burstCount: 5, burstDelay: 60,
    spawn(rect) {
      const a = -Math.PI / 2 + (-0.9 + Math.random() * 1.8), speed = 90 + Math.random() * 100;
      const life = 0.7 + Math.random() * 0.4, size = 20 + Math.random() * 20;
      return {
        src: 'assets/Speed.png', size,
        x: rect.left + rect.width  * (0.2 + Math.random() * 0.6),
        y: rect.top  + rect.height * (0.2 + Math.random() * 0.6),
        vx: Math.cos(a) * speed, vy: Math.sin(a) * speed,
        life, maxLife: life,
        zigFreq: 6 + Math.random() * 6, zigAmp: 55 + Math.random() * 70,
        zigPhase: Math.random() * Math.PI * 2,
        perpX: -Math.sin(a), perpY: Math.cos(a),
        rot: Math.random() * 360, rotV: -80 + Math.random() * 160
      };
    },
    update(p, dt) {
      const elapsed = p.maxLife - p.life;
      const zigV = Math.sin(elapsed * p.zigFreq * Math.PI * 2 + p.zigPhase) * p.zigAmp;
      p.x += (p.vx + p.perpX * zigV) * dt;
      p.y += (p.vy + p.perpY * zigV) * dt;
      p.rot += p.rotV * dt; p.vx *= 0.97; p.vy *= 0.97;
      const t = 1 - p.life / p.maxLife;
      const scale = t < 0.2 ? t / 0.2 : t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3;
      const op = t < 0.15 ? t / 0.15 : t < 0.75 ? 1 : 1 - (t - 0.75) / 0.25;
      p.el.style.opacity = Math.max(op, 0);
      p.el.style.transform = `translate(${p.x}px,${p.y}px) scale(${Math.max(scale, 0)}) rotate(${p.rot}deg)`;
    }
  });


  // ---- player-heads (ship) ----
  makeParticleSystem({
    hotspot: document.getElementById('ship-link'),
    cssClass: 'player_heads', max: 45, interval: 95, burstCount: 6, burstDelay: 55,
    spawn(rect) {
      const cx = rect.left + rect.width * 0.5, cy = rect.top + rect.height * 0.45;
      const r = (Math.random() * 0.38 + 0.05) * rect.width, a = Math.random() * Math.PI * 2;
      const angle = Math.random() * Math.PI * 2, speed = 55 + Math.random() * 80;
      const life = 3.5 + Math.random() * 2.2, size = 12 + Math.random() * 22;
      return {
        src: `assets/player_${1 + Math.floor(Math.random() * 4)}.png`, size,
        x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r, size,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 25,
        life, maxLife: life, rot: Math.random() * 360, rotV: -90 + Math.random() * 180
      };
    },
    update(p, dt) {
      const W = window.innerWidth, H = window.innerHeight;
      p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.rotV * dt;
      if (p.x <= 0)          { p.x = 0;          p.vx *= -0.86; }
      if (p.x + p.size >= W) { p.x = W - p.size; p.vx *= -0.86; }
      if (p.y <= 0)          { p.y = 0;          p.vy *= -0.86; }
      if (p.y + p.size >= H) { p.y = H - p.size; p.vy *= -0.86; }
      p.vx *= 0.996; p.vy *= 0.996;
      const op = Math.max(p.life / p.maxLife, 0);
      p.el.style.opacity = op;
      p.el.style.transform = `translate(${p.x}px,${p.y}px) scale(${0.65 + op * 0.45}) rotate(${p.rot}deg)`;
    }
  });

  </script>
</body>
